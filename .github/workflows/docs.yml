name: Build and Deploy DocC

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate DocC
        run: |
          # 1. Build archive for KeyringAccess
          swift package generate-documentation --target KeyringAccess || true
      
          # 2. Locate the generated archive
          KA_PATH=$(find .build -name "KeyringAccess.doccarchive" -type d | head -n 1)
      
          # 3. Process KeyringAccess
          xcrun docc process-archive transform-for-static-hosting \
            "$KA_PATH" \
            --output-path ./docs \
            --hosting-base-path KeyringAccess
      
          # 4. Create redirect
          echo '<script>window.location.href += "/documentation/keyringaccess"</script>' > ./docs/index.html
                  
            - name: Setup Pages
              uses: actions/configure-pages@v4
            
            - name: Upload artifact
              uses: actions/upload-pages-artifact@v3
              with:
                path: ./docs
  
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
