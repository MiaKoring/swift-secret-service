name: Build and Deploy DocC

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate DocC
        run: |
          mkdir -p docs-archives
          
          # 1. Generate archives for specific targets
          swift package generate-documentation --target KeyringAccess --output-path ./docs-archives
          swift package generate-documentation --target SecretService --output-path ./docs-archives
          
          # 2. Process KeyringAccess into the final docs folder
          xcrun docc process-archive transform-for-static-hosting \
            ./docs-archives/KeyringAccess.doccarchive \
            --output-path ./docs \
            --hosting-base-path KeyringAccess

          # 3. Process SecretService into the SAME docs folder (merging data)
          xcrun docc process-archive transform-for-static-hosting \
            ./docs-archives/SecretService.doccarchive \
            --output-path ./docs \
            --hosting-base-path KeyringAccess

          # 4. Create a root redirect (defaults to KeyringAccess)
          echo '<script>window.location.href += "/documentation/keyringaccess"</script>' > ./docs/index.html
            
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs
  
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
