name: Build and Deploy DocC

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate DocC
        run: |
          # Create the directory structure first
          mkdir -p ./docs/keyring
          mkdir -p ./docs/secret
      
          # Generate KeyringAccess
          swift package --allow-writing-to-package-directory \
            generate-documentation --target KeyringAccess \
            --transform-for-static-hosting \
            --hosting-base-path KeyringAccess/keyring \
            --output-path ./docs/keyring

          # Generate SecretService
          swift package --allow-writing-to-package-directory \
            generate-documentation --target SecretService \
            --transform-for-static-hosting \
            --hosting-base-path KeyringAccess/secret \
            --output-path ./docs/secret

          # Simple landing redirect (or use a list as shown previously)
          echo '<script>window.location.href += "/keyring/documentation/keyringaccess"</script>' > ./docs/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs
  
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
