name: Build and Deploy DocC

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Swift
        run: |
          sudo apt-get update
          sudo apt-get install -y swift
      
      - name: Generate DocC
        run: |
          swift package --allow-writing-to-directory ./docs \
            generate-documentation \
            --target YourTargetName \
            --output-path ./docs \
            --disable-indexing \
            --transform-for-static-hosting \
            --hosting-base-path your-repo-name
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs
  
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
