name: Build and Deploy DocC

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate DocC
        run: |
          # 1. Generate archives (do NOT pre-create these paths with mkdir)
          swift package generate-documentation --target KeyringAccess --output-path ./KA.doccarchive
          swift package generate-documentation --target SecretService --output-path ./SS.doccarchive
          
          # 2. Process KeyringAccess into the static folder
          xcrun docc process-archive transform-for-static-hosting \
            ./KA.doccarchive \
            --output-path ./docs \
            --hosting-base-path KeyringAccess

          # 3. Merge SecretService into the same static folder
          xcrun docc process-archive transform-for-static-hosting \
            ./SS.doccarchive \
            --output-path ./docs \
            --hosting-base-path KeyringAccess

          # 4. Create root redirect (DocC uses lowercase paths for targets)
          echo '<script>window.location.href += "/documentation/keyringaccess"</script>' > ./docs/index.html
            
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs
  
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
