name: Build and Deploy DocC

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate DocC
        run: |
          # 1. Generate KeyringAccess
          swift package --allow-writing-to-package-directory \
            generate-documentation --target KeyringAccess \
            --transform-for-static-hosting \
            --hosting-base-path KeyringAccess/keyring \
            --output-path ./docs/keyring

          # 2. Generate SecretService
          swift package --allow-writing-to-package-directory \
            generate-documentation --target SecretService \
            --transform-for-static-hosting \
            --hosting-base-path KeyringAccess/secret \
            --output-path ./docs/secret

          # 3. Create a landing page to choose between them
          echo '<html><body>
            <h1>Documentation</h1>
            <ul>
              <li><a href="keyring/documentation/keyringaccess">KeyringAccess</a></li>
              <li><a href="secret/documentation/secretservice">SecretService</a></li>
            </ul>
          </body></html>' > ./docs/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs
  
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
