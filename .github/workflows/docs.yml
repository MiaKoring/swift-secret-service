name: Build and Deploy DocC

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Generate DocC
        run: |
          # 1. Generate the archive. Force the include of the docc bundle.
          swift package --allow-writing-to-package-directory \
            generate-documentation --target KeyringAccess \
            --fallback-bundle-identifier com.mia.KeyringAccess \
            --transform-for-static-hosting \
            --hosting-base-path KeyringAccess \
            --output-path ./docs

          # 2. Flexible redirect to the documentation index
          # This allows the DocC router to handle /tutorials or /documentation
          echo '<script>
            if (window.location.pathname.split("/").length <= 2) {
              window.location.replace(window.location.pathname + "documentation/keyringaccess");
            }
          </script>' > ./docs/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs
  
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
