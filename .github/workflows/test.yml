name: Swift Test (Ubuntu 24.04)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: blacksmith-8vcpu-ubuntu-2404-arm
    container:
      image: swift:6.2.3-noble

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y dbus-x11 gnome-keyring

      - name: Test with DBus & Secret Service
        run: |
          # DBus Session Bus starten
          dbus-run-session -- sh -c '
            # initialize Gnome Keyring (Headless)
            # pass "test" via stdin
            eval $(echo "test" | gnome-keyring-daemon --unlock --components=secrets)
            
            RUN_INTEGRATION_TESTS=1 swift test -Xcc -I/usr/include -Xlinker -L/usr/lib
          '